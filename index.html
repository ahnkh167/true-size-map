<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>세계지도 크기 비교 / True Size Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif; }
  #map { position: absolute; inset: 0; cursor: grab; }
  #map.dragging-country { cursor: grabbing; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: white; padding: 14px; border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18); width: 280px;
    max-height: calc(100vh - 24px); overflow-y: auto;
    box-sizing: border-box;
  }
  #panel-toggle {
    position: absolute; top: 8px; right: 8px;
    width: 28px; height: 28px;
    border: 1px solid #ddd; background: white;
    border-radius: 6px; cursor: pointer;
    font-size: 16px; padding: 0; line-height: 1; color: #555;
  }
  #panel.collapsed { padding: 10px 14px; max-height: 42px; overflow: hidden; }
  #panel.collapsed > *:not(h1):not(#panel-toggle) { display: none; }
  h1 { font-size: 15px; margin: 0 0 10px; color: #222; padding-right: 32px; }
  @media (max-width: 640px) {
    #panel {
      left: 8px; right: 8px; top: 8px;
      width: auto; padding: 12px; max-height: 60vh;
    }
    #panel.collapsed { max-height: 40px; padding: 9px 12px; }
    h1 { font-size: 14px; margin-bottom: 8px; }
    #search { font-size: 16px; } /* avoid iOS zoom on focus */
    #controls { grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); }
    #controls button { width: 40px; height: 40px; font-size: 18px; }
  }
  #search {
    width: 100%; padding: 9px 10px; box-sizing: border-box;
    border: 1px solid #d0d0d0; border-radius: 6px; font-size: 14px; outline: none;
  }
  #search:focus { border-color: #4a90e2; }
  #results { max-height: 240px; overflow-y: auto; margin-top: 6px; }
  .result {
    padding: 8px 10px; cursor: pointer; border-radius: 5px;
    font-size: 13px; color: #333; display: flex; justify-content: space-between;
  }
  .result:hover { background: #f1f5fa; }
  .result .en { color: #888; font-size: 12px; }
  #hint { font-size: 11px; color: #777; margin-top: 10px; line-height: 1.5; }
  #clear {
    margin-top: 8px; width: 100%; padding: 7px; cursor: pointer;
    background: #f5f5f5; border: 1px solid #ddd; border-radius: 5px; font-size: 13px;
  }
  #clear:hover { background: #ebebeb; }
  #active-info {
    margin-top: 10px; padding: 8px 10px; border-radius: 6px;
    background: #f7f9fc; border: 1px solid #e3e8ef;
    font-size: 12px; color: #333; line-height: 1.4;
  }
  #active-info.empty { color: #999; }
  #active-info b { font-size: 13px; }
  #active-info .info-sub { font-size: 11px; color: #777; margin-top: 2px; }
  #active-info .info-body { display: flex; gap: 10px; align-items: flex-start; margin-top: 8px; }
  #active-info .flag { width: 46px; height: 32px; object-fit: cover; border: 1px solid #e0e0e0; border-radius: 3px; flex-shrink: 0; }
  #active-info dl { margin: 0; font-size: 11px; flex: 1; }
  #active-info dt { color: #888; }
  #active-info dd { margin: 0 0 4px; font-weight: 600; color: #222; }
  #active-info .wiki-link { display: inline-block; margin-top: 8px; font-size: 11px; color: #3366bb; text-decoration: none; }
  #active-info .wiki-link:hover { text-decoration: underline; }
  #active-info .info-loading { color: #999; font-size: 11px; margin-top: 6px; }
  #controls {
    margin-top: 10px;
    display: grid;
    grid-template-columns: repeat(3, 34px);
    grid-template-rows: repeat(3, 34px);
    gap: 4px; justify-content: start;
  }
  #controls button {
    width: 34px; height: 34px;
    border: 1px solid #ddd; background: white;
    border-radius: 6px; cursor: pointer;
    font-size: 16px; padding: 0; color: #444;
  }
  #controls button:hover:not(:disabled) { background: #eef3fa; border-color: #b8cbe6; }
  #controls button:disabled { opacity: 0.35; cursor: default; }
  .btn-up    { grid-column: 2; grid-row: 1; }
  .btn-left  { grid-column: 1; grid-row: 2; }
  .btn-down  { grid-column: 2; grid-row: 2; }
  .btn-right { grid-column: 3; grid-row: 2; }
  .btn-ccw   { grid-column: 1; grid-row: 3; }
  .btn-cw    { grid-column: 3; grid-row: 3; }
  .ctrl-hint { font-size: 10px; color: #999; margin-top: 4px; }
  #sub-toggle {
    margin-top: 10px; padding: 8px 10px; border-radius: 6px;
    background: #fafafa; border: 1px solid #e3e3e3;
    font-size: 12px; color: #333; display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
  }
  #sub-toggle input { margin: 0; cursor: pointer; }
  #sub-toggle .sub-label { flex: 1; line-height: 1.3; }
  #sub-toggle .sub-label small { display: block; color: #888; font-size: 10px; }
  #added { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 3px 8px; border-radius: 10px; color: white;
  }
  .chip button { background: rgba(255,255,255,.3); border: 0; color: white; cursor: pointer; border-radius: 50%; width: 16px; height: 16px; font-size: 11px; line-height: 1; padding: 0; }
  .country-label {
    background: transparent; border: 0; box-shadow: none;
    color: #2b2b2b; font-size: 11px; font-weight: 600;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;
    pointer-events: none; white-space: nowrap;
  }
  .country-label::before { display: none !important; }
  .state-label {
    background: transparent; border: 0; box-shadow: none;
    color: #444; font-size: 10px; font-weight: 500;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;
    pointer-events: none; white-space: nowrap;
  }
  .state-label::before { display: none !important; }
</style>
</head>
<body>
<div id="panel">
  <button id="panel-toggle" title="접기/펼치기 · Collapse/Expand">−</button>
  <h1>세계지도 크기 비교 · True Size Map</h1>
  <input id="search" placeholder="나라 검색 / Search (예: 한국, Korea)" autocomplete="off">
  <div id="results"></div>
  <label id="sub-toggle">
    <input type="checkbox" id="sub-toggle-cb">
    <span class="sub-label">
      주/도 보기 · Show subdivisions
      <small>전세계 나라의 주/도 단위 클릭 (~4,400개)</small>
    </span>
  </label>
  <div id="active-info" class="empty">선택된 나라/주 없음 · Nothing selected</div>
  <div id="controls" aria-label="선택된 나라 조종">
    <button class="btn-up"    data-act="up"    title="위로 이동 (↑)">↑</button>
    <button class="btn-left"  data-act="left"  title="왼쪽 이동 (←)">←</button>
    <button class="btn-down"  data-act="down"  title="아래로 이동 (↓)">↓</button>
    <button class="btn-right" data-act="right" title="오른쪽 이동 (→)">→</button>
    <button class="btn-ccw"   data-act="ccw"   title="반시계 회전 (Q)">↺</button>
    <button class="btn-cw"    data-act="cw"    title="시계 회전 (E)">↻</button>
  </div>
  <div class="ctrl-hint">Shift 누르면 5× 더 크게 / Hold Shift for 5× step</div>
  <div id="added"></div>
  <button id="clear">모두 지우기 / Clear all</button>
  <div id="hint">
    • 드래그 또는 <b>방향키</b>로 이동 (Shift = 5°씩)<br>
    • 칩을 클릭하면 그 나라/주가 <b>활성화</b>되어 방향키로 조종 가능<br>
    • 미국 주 이름(California, Texas 등)도 검색 가능<br>
    • Drag or use <b>arrow keys</b> (Shift for bigger steps). US states are searchable too.
  </div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  const countryAreaRank = {}; // iso3 → rank
  let countryTotal = 0;
  const subRanks = {};        // "{country}:{name}" → rank within country (by area)
  const subCountryTotals = {}; // country → total ranked items

  function computeSubRanks() {
    const byCountry = {};
    Object.entries(subInfo).forEach(([key, info]) => {
      const [c, n] = key.split(':');
      if (!byCountry[c]) byCountry[c] = [];
      byCountry[c].push({ key, area: info.area });
    });
    Object.entries(byCountry).forEach(([c, arr]) => {
      arr.sort((a, b) => b.area - a.area);
      subCountryTotals[c] = arr.length;
      arr.forEach((item, i) => { subRanks[item.key] = i + 1; });
    });
  }
  computeSubRanks();

      countryTotal = sorted.length;
      sorted.forEach((c, i) => { countryAreaRank[c.cca3] = i + 1; });
    } catch (e) { console.error('country rankings failed', e); }
  }

  function eachCoord(geom, fn) {
    const walk = (arr) => {
      if (typeof arr[0] === 'number') { fn(arr); return; }
      arr.forEach(walk);
    };
    walk(geom.coordinates);
  }
  function featureBBox(f) {
    let minX = 180, minY = 90, maxX = -180, maxY = -90;
    eachCoord(f.geometry, ([x, y]) => {
      if (x < minX) minX = x; if (y < minY) minY = y;
      if (x > maxX) maxX = x; if (y > maxY) maxY = y;
    });
    return [minX, minY, maxX, maxY];
  }
  function featureArea(f) {
    const [a, b, c, d] = featureBBox(f);
    return (c - a) * (d - b);
  }
  // For labels, use the largest polygon's bbox center so it sits over the main landmass
  function featureCenter(f) {
    const polys = [];
    const collect = (arr, depth) => {
      if (depth === 0) { polys.push(arr); return; }
      arr.forEach(sub => collect(sub, depth - 1));
    };
    if (f.geometry.type === 'Polygon') polys.push(f.geometry.coordinates);
    else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(p => polys.push(p));
    else return null;
    let best = null, bestArea = -1;
    polys.forEach(poly => {
      const ring = poly[0];
      let minX = 180, minY = 90, maxX = -180, maxY = -90;
      ring.forEach(([x, y]) => {
        if (x < minX) minX = x; if (y < minY) minY = y;
        if (x > maxX) maxX = x; if (y > maxY) maxY = y;
      });
      const a = (maxX - minX) * (maxY - minY);
      if (a > bestArea) { bestArea = a; best = [(minX + maxX) / 2, (minY + maxY) / 2]; }
    });
    return best ? L.latLng(best[1], best[0]) : null;
  }
  function labelMinZoom(area) {
    if (area > 400) return 2;
    if (area > 80) return 3;
    if (area > 20) return 4;
    if (area > 5) return 5;
    return 6;
  }
  function updateLabelVisibility() {
    const z = map.getZoom();
    countryLabels.forEach(m => {
      const should = z >= m._minZoom;
      const on = map.hasLayer(m);
      if (should && !on) m.addTo(map);
      else if (!should && on) map.removeLayer(m);
    });
    subLabels.forEach(m => {
      const should = subsVisible && z >= 4;
      const on = map.hasLayer(m);
      if (should && !on) m.addTo(map);
      else if (!should && on) map.removeLayer(m);
    });
  }
  map.on('zoomend', updateLabelVisibility);

  // Unified loader for subdivisions
  //   opts: { nameProp, filter, nameMap (translate native → English) }
  function loadSubdivisions(url, code, koDict, opts = {}) {
    return fetch(url).then(r => r.json()).then(data => {
      let features = data.features;
      if (opts.filter) features = features.filter(opts.filter);
      features.forEach(f => {
        const p = f.properties || {};
        let name = opts.nameProp ? p[opts.nameProp]
          : (p.name_english || p.name_eng || p.NAME_1 || p.STATE_NAME || p.SUBUNIT || p.name || p.NAME);
        if (!name) return;
        if (opts.nameMap) name = opts.nameMap[name] || name;
        const koName = koDict[name] || name;

        const c = featureCenter(f);
        if (c) {
          const marker = L.marker(c, {
            icon: L.divIcon({ className: 'state-label', html: name }),
            interactive: false, keyboard: false
          });
          subLabels.push(marker);
        }

        const layer = L.geoJSON(f, {
          style: { color: '#9a9a9a', weight: 0.7, opacity: 0.75, fillColor: '#000', fillOpacity: 0 }
        });
        layer.eachLayer(sub => {
          sub.bindTooltip(`${koName} (${code}) · ${name}`, { sticky: true });
          sub.on('mouseover', () => sub.setStyle({ fillOpacity: 0.1 }));
          sub.on('mouseout',  () => sub.setStyle({ fillOpacity: 0 }));
          sub.on('click', (e) => {
            L.DomEvent.stopPropagation(e);
            addCountry({ name, koName, geometry: f.geometry, isState: true, country: code });
          });
        });
        subBaseLayers.push(layer);

        items.push({
          name, koName,
          geometry: f.geometry,
          isState: true, country: code
        });
      });
      items.sort((a, b) => a.name.localeCompare(b.name));
      if (subsVisible) applySubsVisibility();
    }).catch(e => console.error(`Subdivisions load failed (${code})`, e));
  }

  // Load every country's admin-1 from Natural Earth, EXCEPT countries we already loaded
  // separately (they have nicer geometry + Korean names + detailed info).
  function loadGlobalSubdivisions(url, excludeCodes) {
    const exclude = new Set(excludeCodes);
    const canvasRenderer = L.canvas({ padding: 0.3 });
    return fetch(url).then(r => r.json()).then(data => {
      // Group features by country code (iso_a2)
      const byCountry = {};
      data.features.forEach(f => {
        const p = f.properties || {};
        const code = p.iso_a2;
        if (!code || code === '-99' || exclude.has(code)) return;
        if (!p.name) return;
        if (!byCountry[code]) byCountry[code] = [];
        byCountry[code].push(f);
      });

      Object.entries(byCountry).forEach(([code, feats]) => {
        // Searchable items only — skip on-map labels for the global set to keep
        // pan/zoom snappy (4400 markers would tank performance).
        feats.forEach(f => {
          items.push({
            name: f.properties.name, koName: f.properties.name,
            geometry: f.geometry,
            isState: true, country: code
          });
        });

        // ONE Leaflet layer per country (much faster than per-feature)
        // Canvas renderer handles many polygons more efficiently than SVG.
        const layer = L.geoJSON({ type: 'FeatureCollection', features: feats }, {
          renderer: canvasRenderer,
          style: { color: '#9a9a9a', weight: 0.5, opacity: 0.6, fillColor: '#000', fillOpacity: 0 },
          onEachFeature: (feature, sub) => {
            const name = feature.properties.name;
            sub.bindTooltip(`${name} (${code})`, { sticky: true });
            sub.on('mouseover', () => sub.setStyle({ fillOpacity: 0.12, weight: 1 }));
            sub.on('mouseout',  () => sub.setStyle({ fillOpacity: 0, weight: 0.5 }));
            sub.on('click', (e) => {
              L.DomEvent.stopPropagation(e);
              addCountry({ name, koName: name, geometry: feature.geometry, isState: true, country: code });
            });
          }
        });
        subBaseLayers.push(layer);
      });

      items.sort((a, b) => a.name.localeCompare(b.name));
      if (subsVisible) applySubsVisibility();
      console.log(`Global subdivisions loaded: ${Object.keys(byCountry).length} countries, ${data.features.length} features`);
    }).catch(e => console.error('Global subdivisions load failed', e));
  }

  function applySubsVisibility() {
    subBaseLayers.forEach(l => {
      if (subsVisible) l.addTo(map);
      else map.removeLayer(l);
    });
    updateLabelVisibility();
  }

  loadSubdivisions('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json', 'US', koStates);
  loadSubdivisions('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/canada.geojson', 'CA', koProvincesCA);
  loadSubdivisions('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/mexico.geojson', 'MX', koStatesMX);
  loadSubdivisions('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson', 'BR', koStatesBR);
  loadSubdivisions('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/japan.geojson', 'JP', koPrefJP, { nameProp: 'name_english' });
  loadSubdivisions('https://raw.githubusercontent.com/rowanhogan/australian-states/master/states.min.geojson', 'AU', koStatesAU, { nameProp: 'STATE_NAME' });
  loadSubdivisions('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2018/json/skorea-provinces-2018-geo.json', 'KR', koProvincesKR, { nameProp: 'name_eng' });
  loadSubdivisions('https://raw.githubusercontent.com/longwosion/geojson-map-china/master/china.json', 'CN', koProvincesCN, { nameProp: 'name', nameMap: cnToEn });
  // UK: Natural Earth map_subunits has 4 UK countries (England, Scotland, Wales, Northern Ireland)
  loadSubdivisions(
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_map_subunits.geojson',
    'GB', koUK,
    { nameProp: 'SUBUNIT', filter: f => (f.properties.ADM0_A3 === 'GBR' || f.properties.SOV_A3 === 'GB1') }
  );

  // ALL OTHER COUNTRIES: Natural Earth admin-1 (~4400 features). One fetch.
  loadGlobalSubdivisions(
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_1_states_provinces.geojson',
    ['US', 'CA', 'MX', 'BR', 'JP', 'CN', 'KR', 'AU', 'GB']
  );

  fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
    .then(r => r.json())
    .then(data => {
      items = data.features.map(f => ({
        name: f.properties.name,
        koName: ko[f.properties.name] || f.properties.name,
        geometry: f.geometry,
        iso: f.id
      })).sort((a, b) => a.name.localeCompare(b.name));

      // Clickable country borders — click to add as draggable
      L.geoJSON(data, {
        style: { color: '#8a8a8a', weight: 1, opacity: 0.85, fillColor: '#000', fillOpacity: 0 },
        onEachFeature: (feature, sub) => {
          const name = feature.properties.name;
          const koName = ko[name] || name;
          sub.bindTooltip(`${koName} · ${name}`, { sticky: true });
          sub.on('mouseover', () => sub.setStyle({ fillOpacity: 0.08 }));
          sub.on('mouseout',  () => sub.setStyle({ fillOpacity: 0 }));
          sub.on('click', (e) => {
            L.DomEvent.stopPropagation(e);
            addCountry({ name, koName, geometry: feature.geometry, iso: feature.id });
          });
        }
      }).addTo(map);

      // Country name labels (English), hidden at low zoom via updateLabelVisibility
      data.features.forEach(f => {
        const c = featureCenter(f);
        if (!c) return;
        const area = featureArea(f);
        const marker = L.marker(c, {
          icon: L.divIcon({ className: 'country-label', html: f.properties.name }),
          interactive: false,
          keyboard: false
        });
        marker._minZoom = labelMinZoom(area);
        countryLabels.push(marker);
      });
      updateLabelVisibility();
    })
    .catch(e => {
      resultsEl.innerHTML = '<div class="result">데이터 로드 실패 / Failed to load data</div>';
      console.error(e);
    });

  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) { resultsEl.innerHTML = ''; return; }
    const matches = items.filter(c =>
      c.name.toLowerCase().includes(q) || c.koName.toLowerCase().includes(q)
    ).slice(0, 8);
    resultsEl.innerHTML = matches.map(c =>
      `<div class="result" data-name="${c.name}" data-state="${c.isState ? 1 : 0}">` +
        `<span>${c.koName}${c.isState ? ' <em style="color:#999;font-style:normal">(US)</em>' : ''}</span>` +
        `<span class="en">${c.name}</span>` +
      `</div>`
    ).join('');
  });

  resultsEl.addEventListener('click', (e) => {
    const row = e.target.closest('.result');
    if (!row) return;
    const item = items.find(c => c.name === row.dataset.name && !!c.isState === (row.dataset.state === '1'));
    if (item) addCountry(item);
    searchEl.value = '';
    resultsEl.innerHTML = '';
  });

  let hueStep = 0;
  function nextColor() {
    hueStep = (hueStep + 73) % 360;
    return `hsl(${hueStep}, 75%, 48%)`;
  }

  const activeInfoEl = document.getElementById('active-info');
  function setActive(layer) {
    if (activeLayer && activeLayer !== layer && activeLayer._baseColor) {
      activeLayer.setStyle({ weight: 2, color: activeLayer._baseColor });
    }
    activeLayer = layer;
    updateControlsEnabled();
    if (layer) {
      layer.setStyle({ weight: 1.5, color: '#333' });
      renderActiveInfo(layer);
    } else {
      activeInfoEl.classList.add('empty');
      activeInfoEl.textContent = '선택된 나라/주 없음 · Nothing selected';
    }
  }

  const infoCache = {};
  async function fetchCountryInfo(iso) {
    if (!iso) return null;
    if (infoCache[iso]) return infoCache[iso];
    try {
      const res = await fetch(`https://restcountries.com/v3.1/alpha/${iso}?fields=flags,population,area,capital,region,name`);
      if (!res.ok) throw new Error('not found');
      const data = await res.json();
      infoCache[iso] = Array.isArray(data) ? data[0] : data;
      return infoCache[iso];
    } catch (e) { return null; }
  }

  function wikiUrl(name) {
    return `https://en.wikipedia.org/wiki/${encodeURIComponent(name.replace(/ /g, '_'))}`;
  }

  const fmtNum = (n) => (n == null ? '-' : Number(n).toLocaleString());

  async function renderActiveInfo(layer) {
    const meta = layer._meta || {};
    const subTag = meta.isState ? ` <span style="color:#999;font-weight:normal">(${meta.country || 'sub'})</span>` : '';
    const head =
      `<div><b>${meta.koName || '-'}</b>${subTag}</div>` +
      `<div class="info-sub">${meta.name || '-'}</div>`;

    activeInfoEl.classList.remove('empty');

    if (meta.isState) {
      // Try normalized name variants so Korean/UK forms with suffixes still match subInfo
      const variants = [
        meta.name,
        meta.name.replace(/ Province$/, ''),
        meta.name.replace(/-do$/, ''),
        meta.name.replace(/-do Province$/, ''),
        meta.name.replace(/ Special Self-Governing Province$/, ''),
        meta.name.replace(/특별시$|광역시$|특별자치시$|특별자치도$|도$/, '')
      ];
      let info, rank, matchedKey;
      for (const v of variants) {
        const k = `${meta.country}:${v}`;
        if (subInfo[k]) { info = subInfo[k]; matchedKey = k; break; }
      }
      for (const v of variants) {
        const k = `${meta.country}:${v}`;
        if (subRanks[k]) { rank = subRanks[k]; break; }
      }
      const total = subCountryTotals[meta.country];
      const flagSrc = subFlagUrl(meta.name);
      let body = '';
      if (info) {
        body = `
          <div class="info-body">
            <img class="flag" src="${flagSrc}" alt="flag" onerror="this.style.display='none'">
            <dl>
              <dt>인구 · Population</dt><dd>${fmtNum(info.pop)}</dd>
              <dt>면적 · Area</dt><dd>${fmtNum(info.area)} km²</dd>
              ${rank ? `<dt>${meta.country} 내 면적 순위 · Rank</dt><dd>#${rank} / ${total}</dd>` : ''}
            </dl>
          </div>`;
      } else {
        body = `<div class="info-sub" style="margin-top:6px">상세 정보 없음 · No detailed info</div>`;
      }
      activeInfoEl.innerHTML = head + body +
        `<a class="wiki-link" href="${wikiUrl(meta.name)}" target="_blank" rel="noopener">위키백과에서 보기 · View on Wikipedia ↗</a>`;
      return;
    }

    activeInfoEl.innerHTML = head + `<div class="info-loading">정보 불러오는 중…</div>`;
    const info = await fetchCountryInfo(meta.iso);
    if (activeLayer !== layer) return;

    if (!info) {
      activeInfoEl.innerHTML = head +
        `<a class="wiki-link" href="${wikiUrl(meta.name)}" target="_blank" rel="noopener">위키백과에서 보기 · View on Wikipedia ↗</a>`;
      return;
    }

    const wikiName = (info.name && info.name.common) || meta.name;
    const rank = countryAreaRank[meta.iso];
    activeInfoEl.innerHTML = head + `
      <div class="info-body">
        <img class="flag" src="${info.flags.svg || info.flags.png}" alt="flag">
        <dl>
          <dt>인구 · Population</dt><dd>${fmtNum(info.population)}</dd>
          <dt>면적 · Area</dt><dd>${fmtNum(info.area)} km²</dd>
          ${rank ? `<dt>세계 면적 순위 · World area rank</dt><dd>#${rank} / ${countryTotal}</dd>` : ''}
          ${info.capital && info.capital[0] ? `<dt>수도 · Capital</dt><dd>${info.capital[0]}</dd>` : ''}
          ${info.region ? `<dt>지역 · Region</dt><dd>${info.region}</dd>` : ''}
        </dl>
      </div>
      <a class="wiki-link" href="${wikiUrl(wikiName)}" target="_blank" rel="noopener">위키백과에서 보기 · View on Wikipedia ↗</a>
    `;
  }

  function shiftLayer(groupLayer, dLat, dLng) {
    groupLayer.eachLayer(sub => {
      if (sub.setLatLngs) sub.setLatLngs(shiftLatLngs(sub.getLatLngs(), dLat, dLng));
    });
  }

  // Rotate a GeoJSON layer around its centroid by angleDeg (positive = clockwise on screen)
  function rotateLayer(groupLayer, angleDeg) {
    const rad = angleDeg * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    const center = groupLayer.getBounds().getCenter();
    const cp = map.latLngToLayerPoint(center);
    const rotate = (ll) => {
      if (Array.isArray(ll)) return ll.map(rotate);
      const p = map.latLngToLayerPoint(ll);
      const dx = p.x - cp.x, dy = p.y - cp.y;
      // screen y is flipped; positive angle → clockwise visually
      const nx = dx * cos + dy * sin;
      const ny = -dx * sin + dy * cos;
      return map.layerPointToLatLng(L.point(cp.x + nx, cp.y + ny));
    };
    groupLayer.eachLayer(sub => {
      if (sub.setLatLngs) sub.setLatLngs(rotate(sub.getLatLngs()));
    });
  }

  function updateControlsEnabled() {
    document.querySelectorAll('#controls button').forEach(b => b.disabled = !activeLayer);
  }

  document.getElementById('controls').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || !activeLayer) return;
    const act = btn.dataset.act;
    const mult = e.shiftKey ? 5 : 1;
    if (act === 'up')    shiftLayer(activeLayer,  1 * mult, 0);
    else if (act === 'down')  shiftLayer(activeLayer, -1 * mult, 0);
    else if (act === 'left')  shiftLayer(activeLayer, 0, -1 * mult);
    else if (act === 'right') shiftLayer(activeLayer, 0,  1 * mult);
    else if (act === 'ccw')   rotateLayer(activeLayer, -15 * mult);
    else if (act === 'cw')    rotateLayer(activeLayer,  15 * mult);
  });

  updateControlsEnabled();

  document.getElementById('sub-toggle-cb').addEventListener('change', (e) => {
    subsVisible = e.target.checked;
    applySubsVisibility();
  });

  function addCountry(country) {
    const color = nextColor();
    const layer = L.geoJSON(country.geometry, {
      style: { color, weight: 2, fillOpacity: 0.45, fillColor: color }
    }).addTo(map);
    layer._baseColor = color;
    layer._meta = { name: country.name, koName: country.koName, isState: !!country.isState, iso: country.iso, country: country.country };
    layer.bindTooltip(`${country.koName} · ${country.name}`, { sticky: true });
    makeDraggable(layer);
    try { map.fitBounds(layer.getBounds(), { padding: [60, 60], maxZoom: 5 }); } catch (_) {}

    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.style.background = color;
    chip.innerHTML = `${country.koName}${country.isState ? ' (US)' : ''} <button title="제거">×</button>`;
    chip.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') return;
      setActive(layer);
    });
    chip.querySelector('button').addEventListener('click', () => {
      map.removeLayer(layer);
      chip.remove();
      const idx = layers.indexOf(layer); if (idx >= 0) layers.splice(idx, 1);
      if (activeLayer === layer) activeLayer = null;
    });
    addedEl.appendChild(chip);
    layers.push(layer);
    setActive(layer);
  }

  document.getElementById('clear').addEventListener('click', () => {
    layers.forEach(l => map.removeLayer(l));
    layers.length = 0;
    addedEl.innerHTML = '';
    activeLayer = null;
  });

  // Arrow-key nudge for the active layer (shift = 5°, plain = 1°)
  document.addEventListener('keydown', (e) => {
    if (!activeLayer) return;
    if (document.activeElement === searchEl) return;
    const step = e.shiftKey ? 5 : 1;
    let dLat = 0, dLng = 0;
    if (e.key === 'ArrowUp') dLat = step;
    else if (e.key === 'ArrowDown') dLat = -step;
    else if (e.key === 'ArrowLeft') dLng = -step;
    else if (e.key === 'ArrowRight') dLng = step;
    else if (e.key === 'q' || e.key === 'Q') { e.preventDefault(); rotateLayer(activeLayer, -15 * (e.shiftKey ? 3 : 1)); return; }
    else if (e.key === 'e' || e.key === 'E') { e.preventDefault(); rotateLayer(activeLayer,  15 * (e.shiftKey ? 3 : 1)); return; }
    else return;
    e.preventDefault();
    shiftLayer(activeLayer, dLat, dLng);
  });

  // Shift every LatLng in a (possibly nested) latlngs array by (dLat, dLng)
  function shiftLatLngs(ll, dLat, dLng) {
    if (Array.isArray(ll)) return ll.map(x => shiftLatLngs(x, dLat, dLng));
    return L.latLng(ll.lat + dLat, ll.lng + dLng);
  }

  // Shared drag state — lets us bind global mouse/touch move handlers once
  const mapEl = map.getContainer();
  let dragLayer = null;
  let dragLast = null;

  function touchToLatLng(touch) {
    const rect = mapEl.getBoundingClientRect();
    return map.containerPointToLatLng(L.point(touch.clientX - rect.left, touch.clientY - rect.top));
  }
  function startDrag(layer, latlng, origEvent) {
    dragLayer = layer;
    dragLast = latlng;
    setActive(layer);
    map.dragging.disable();
    mapEl.classList.add('dragging-country');
    if (origEvent) {
      L.DomEvent.stopPropagation(origEvent);
      L.DomEvent.preventDefault(origEvent);
    }
  }
  function moveDrag(latlng) {
    if (!dragLayer) return;
    const dLat = latlng.lat - dragLast.lat;
    const dLng = latlng.lng - dragLast.lng;
    shiftLayer(dragLayer, dLat, dLng);
    dragLast = latlng;
  }
  function endDrag() {
    if (!dragLayer) return;
    dragLayer = null;
    dragLast = null;
    map.dragging.enable();
    mapEl.classList.remove('dragging-country');
  }

  map.on('mousemove', (e) => moveDrag(e.latlng));
  map.on('mouseup', endDrag);
  map.on('mouseout', endDrag);

  mapEl.addEventListener('touchmove', (e) => {
    if (!dragLayer || !e.touches[0]) return;
    moveDrag(touchToLatLng(e.touches[0]));
    e.preventDefault();
  }, { passive: false });
  mapEl.addEventListener('touchend', endDrag);
  mapEl.addEventListener('touchcancel', endDrag);

  function makeDraggable(groupLayer) {
    groupLayer.eachLayer(sub => {
      sub.on('mousedown', (e) => startDrag(groupLayer, e.latlng, e.originalEvent));
      if (sub._path) {
        L.DomEvent.on(sub._path, 'touchstart', (e) => {
          if (!e.touches[0]) return;
          startDrag(groupLayer, touchToLatLng(e.touches[0]), e);
        });
      }
    });
  }

  // Panel collapse toggle (useful on mobile)
  const panelEl = document.getElementById('panel');
  const panelToggleEl = document.getElementById('panel-toggle');
  panelToggleEl.addEventListener('click', () => {
    const collapsed = panelEl.classList.toggle('collapsed');
    panelToggleEl.textContent = collapsed ? '+' : '−';
  });
  // Auto-collapse on small screens at start
  if (window.matchMedia('(max-width: 640px)').matches) {
    panelEl.classList.add('collapsed');
    panelToggleEl.textContent = '+';
  }
})();
</script>
</body>
</html>
